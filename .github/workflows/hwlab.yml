name: HWLAB CI

# Public showcase workflow
# Requires access to the private HWLAB infrastructure
# and self-hosted Raspberry Pi validation runners.

on:
  workflow_dispatch:

jobs:

  hardware-test:

    runs-on: [self-hosted, hwlab]

    steps:

      - name: Update HWLAB
        run: |
          cd ~/hwlab
          git pull

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HWLAB pipeline
        run: |
          ./scripts/run_pipeline.sh \
          rpi-target-01

          ./scripts/run_pipeline.sh \
          rpi-target-02          

      - name: Upload reports

        uses: actions/upload-artifact@v4

        with:

          name: hwlab-report

          retention-days: 7

          path: |
            reports/latest.txt
            logs/target.log
            logs/uart_orchestrator.stdout
            history/